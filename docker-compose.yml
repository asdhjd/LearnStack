version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: learnstack_db
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./learnstack.sql:/docker-entrypoint-initdb.d/learnstack.sql
    ports:
      - "3306:3306"
    networks:
      - learnstack_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./learnstack_backend
    container_name: learnstack_backend
    env_file:
      - .env
    environment:
      - DATABASE_HOST=db
    volumes:
      - ./learnstack_backend/media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - learnstack_network
    restart: unless-stopped

  frontend:
    build: ./learnstack_frontend
    container_name: learnstack_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - learnstack_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  learnstack_network:
    driver: bridge